<div class="upload-container">
    <nz-card [nzBordered]="false" nzTitle="Upload file">
        <nz-upload nzType="drag" [nzMultiple]="true" nzAction="https://www.mocky.io/v2/5cc8019d300000980a055e76"
            (nzChange)="handleChange($event)" [nzShowUploadList]="false" class="upload-drag-area">
            <p class="ant-upload-drag-icon">
                <i nz-icon nzType="file-add"></i>
            </p>
            <p class="ant-upload-text">
                Drag and Drop file here or <span class="browse-link">Choose file</span>
            </p>
            <div class="upload-hint">
                <span>Supported formats: XLS, XLSX</span>
                <span>Maximum size: 25MB</span>
            </div>
        </nz-upload>

        <div class="file-list-container" *ngFor="let file of fileList">
            <div class="file-item-card" *ngIf="file.status !== 'removed'">
                <div class="file-info">
                    <i nz-icon nzType="file-excel" nzTheme="fill" class="excel-icon"></i>
                    <div class="file-details">
                        <span class="file-name">{{ file.name }}</span>
                        <span class="file-size">{{ file.size | number }} KB</span>
                    </div>
                    <i nz-icon nzType="close" class="remove-icon" (click)="removeFile(file)"></i>
                </div>

                <div class="progress-section">
                    <nz-progress [nzPercent]="file.percent" nzSize="small" [nzShowInfo]="true" nzStatus="active">
                    </nz-progress>
                </div>
            </div>
        </div>

        <div class="upload-footer">
            <a class="help-link"><i nz-icon nzType="question-circle"></i> Help Center</a>
            <div class="button-group">
                <button nz-button nzType="default" (click)="handleCancel()">Cancel</button>
                <button nz-button nzType="primary" [disabled]="fileList.length === 0">Next</button>
            </div>
        </div>
    </nz-card>
</div>
